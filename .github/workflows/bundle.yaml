name: CI - Build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build platform bundles in parallel
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: "*.deb"
            bundle_format: deb
          - os: macos-latest
            artifact: "*.app"
            bundle_format: osx
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bundle-${{ hashFiles('**/Cargo.lock') }}

      # Linux: install system deps that egui needs
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Bundle app
        run: cargo bundle --release --format ${{ matrix.bundle_format }}

      # macOS: zip the .app so it can be uploaded as a single file
      - name: Zip macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          cd target/release/bundle/osx
          zip -r ../../../../squite.zip *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: |
            target/release/bundle/${{ matrix.bundle_format }}/${{ matrix.artifact }}
            squite.zip
          if-no-files-found: error

  # Create the GitHub release and attach all bundles
  release:
    name: Create GitHub Release
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
